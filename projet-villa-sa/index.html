  <title>VILLA SA — Cortoba Architecture Studio</title>
    <meta name="description" content="Le rez-de-chaussée est entièrement tourné vers les espaces de réception et le bien-être. Un séjour cathédrale baigné de lumière s’ouvre généreusement sur la piscine et le jardin, prolongeant les espaces de vie vers l’extérieur.
Le projet se distingue par sa volonté de simplicité fonctionnelle, sans jamais sacrifier le confort. Le garage double, l’ascenseur, les nombreux rangements et la fluidité des circulations témoignent d’une conception rigoureuse, pensée pour le quotidien.
Le choix des matériaux — pierre naturelle, enduit blanc, bois et verre — participe à cette sensation d’élégance intemporelle, tout en renforçant l’intégration du projet dans le cadre naturel et bâti de Djerba." />
