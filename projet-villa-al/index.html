  <title>VILLA  AL — Cortoba Architecture Studio</title>
    <meta name="description" content="Ce projet est une alliance harmonieuse entre fonctionnalité et esthétique. La résidence, conçue comme une maison d’hôtes, marie avec élégance le vocabulaire architectural traditionnel djerbien à des matériaux et des agencements contemporains.

Elle s’inscrit dans une démarche respectueuse du patrimoine architectural, tout en le réinterprétant pour répondre aux exigences d’un mode de vie moderne et minimaliste, tirant pleinement parti des technologies actuelles et de pratiques durables.

Pensée avec flexibilité, la maison est destinée à servir de résidence de vacances durant la saison estivale. Elle peut également être transformée en bien locatif grâce à une configuration modulable permettant d’isoler la suite parentale, offrant ainsi une autonomie et une adaptabilité optimales selon les besoins." />
