<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>Création dossier NAS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#111;color:#eee;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:32px;max-width:480px;width:100%;text-align:center}
h2{font-size:1.1rem;margin-bottom:16px;color:#4ecdc4}
#status{font-size:0.9rem;color:#aaa;margin:12px 0;min-height:40px;line-height:1.5}
.step{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:0.85rem;color:#888;text-align:left}
.step.ok{color:#4ecdc4}
.step.fail{color:#e74c3c}
.step.wait{color:#f39c12}
.step::before{content:'○';font-size:1rem;min-width:18px;text-align:center}
.step.ok::before{content:'✓';color:#4ecdc4}
.step.fail::before{content:'✗';color:#e74c3c}
.step.wait::before{content:'◌';color:#f39c12}
#path-box{background:#0d0d0d;border:1px solid #333;border-radius:8px;padding:12px;margin:16px 0;font-family:'DM Mono',monospace;font-size:0.78rem;color:#f39c12;word-break:break-all;display:none}
.btn{padding:8px 20px;border:none;border-radius:6px;font-size:0.85rem;cursor:pointer;font-family:inherit}
.btn-copy{background:#333;color:#eee;margin-top:12px}
.btn-copy:hover{background:#444}
.btn-close{background:#4ecdc4;color:#111;margin-top:8px;font-weight:600}
.btn-close:hover{background:#3dbdb5}
</style>
</head>
<body>
<div class="card">
  <h2>Création dossier NAS</h2>
  <div id="steps"></div>
  <div id="status">Initialisation...</div>
  <div id="path-box"></div>
  <div id="actions" style="display:none">
    <button class="btn btn-copy" onclick="copyPath()">Copier le chemin</button><br>
    <button class="btn btn-close" onclick="window.close()">Fermer</button>
  </div>
</div>

<script>
var stepsEl = document.getElementById('steps');
var statusEl = document.getElementById('status');
var pathBox = document.getElementById('path-box');
var actionsEl = document.getElementById('actions');

// Lire les parametres depuis le hash (pas envoyes au serveur)
var hash = location.hash.substring(1);
var params = {};
hash.split('&').forEach(function(p){ var kv=p.split('='); if(kv[0]) params[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||''); });

var ip = params.ip || '';
var user = params.user || '';
var pass = params.pass || '';
var port = params.port || '5005';
var folders = params.folders || '';
var nasPath = params.nasPath || '';

function addStep(text, cls) {
  var d = document.createElement('div');
  d.className = 'step ' + (cls||'wait');
  d.textContent = text;
  stepsEl.appendChild(d);
  return d;
}

function updateStep(el, text, cls) {
  if (el) { el.textContent = text; el.className = 'step ' + cls; }
}

function showPath() {
  pathBox.textContent = nasPath || ('\\\\' + ip + '\\' + folders.replace(/\//g, '\\'));
  pathBox.style.display = 'block';
  actionsEl.style.display = 'block';
}

function copyPath() {
  var t = pathBox.textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(t).then(function(){ statusEl.textContent = 'Chemin copie !'; });
  } else {
    var ta = document.createElement('textarea'); ta.value = t; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    statusEl.textContent = 'Chemin copie !';
  }
}

function notifyParent(success, msg) {
  try {
    if (window.opener && window.opener.postMessage) {
      window.opener.postMessage({type:'nas-folder-result', success:success, message:msg}, '*');
    }
  } catch(e){}
}

// ── Methode 1 : WebDAV MKCOL direct (fonctionne si page ouverte en HTTP) ──
function tryWebDAV(baseUrl, parts) {
  var s1 = addStep('WebDAV : connexion a ' + baseUrl + '...', 'wait');
  var created = 0;
  var idx = 0;

  function mkNext() {
    if (idx >= parts.length) {
      updateStep(s1, 'WebDAV : ' + created + ' dossier(s) cree(s)', 'ok');
      return Promise.resolve(created);
    }
    var path = '/' + parts.slice(0, idx + 1).join('/');
    idx++;
    var url = baseUrl + path.split('/').map(encodeURIComponent).join('/');
    var headers = {};
    if (user) headers['Authorization'] = 'Basic ' + btoa(user + ':' + pass);

    return fetch(url, { method: 'MKCOL', headers: headers })
      .then(function(r) {
        if (r.status === 201) created++;
        // 201=cree, 405=existe, 301=redirect — tous OK
        return mkNext();
      });
  }
  return mkNext()
    .then(function(c) { return { ok: true, created: c }; })
    .catch(function(e) {
      updateStep(s1, 'WebDAV : echec — ' + e.message, 'fail');
      return { ok: false, error: e.message };
    });
}

// ── Methode 2 : QTS File Station API ──
function tryQtsApi(baseUrl, parts) {
  var s1 = addStep('QTS API : connexion a ' + baseUrl + '...', 'wait');

  var loginUrl = baseUrl + '/cgi-bin/authLogin.cgi?user=' + encodeURIComponent(user)
               + '&pwd=' + encodeURIComponent(btoa(pass));

  return fetch(loginUrl, { mode: 'cors', credentials: 'include' })
    .then(function(r) { return r.text(); })
    .then(function(xml) {
      var m = xml.match(/<authSid><!\[CDATA\[(.*?)\]\]><\/authSid>/) ||
              xml.match(/<authSid>(.*?)<\/authSid>/);
      if (!m || !m[1] || m[1].length < 5) throw new Error('Auth echouee');
      var sid = m[1];
      updateStep(s1, 'QTS API : connecte', 'ok');

      var created = 0;
      var idx = 0;

      function mkNext() {
        if (idx >= parts.length) return Promise.resolve(created);
        var parentPath = (idx === 0) ? '/' : '/' + parts.slice(0, idx).join('/');
        var childName = parts[idx];
        idx++;
        var sN = addStep('Creation: ' + childName + '...', 'wait');
        var mkUrl = baseUrl + '/cgi-bin/filemanager/utilRequest.cgi?func=createdir&sid=' + encodeURIComponent(sid);
        return fetch(mkUrl, {
          method: 'POST', mode: 'cors', credentials: 'include',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'dest_folder=' + encodeURIComponent(parentPath) + '&dest_path=' + encodeURIComponent(childName)
        })
          .then(function(r) { return r.text(); })
          .then(function(t) {
            var ok = false;
            try {
              var j = JSON.parse(t);
              if (j && (j.status === 1 || j.status === 2 || j.success)) ok = true;
              if (j && j.status === 1) created++;
            } catch(e) {
              if (t.indexOf('error') === -1) ok = true;
            }
            updateStep(sN, childName + (ok ? ' OK' : ' (existe)'), 'ok');
            return mkNext();
          })
          .catch(function(e) {
            updateStep(sN, childName + ' — erreur: ' + e.message, 'fail');
            return mkNext();
          });
      }
      return mkNext().then(function(c) { return { ok: true, created: c }; });
    })
    .catch(function(e) {
      updateStep(s1, 'QTS API : echec — ' + e.message, 'fail');
      return { ok: false, error: e.message };
    });
}

// ── Demarrage : essayer plusieurs methodes ──
function start() {
  if (!ip || !user || !folders) {
    statusEl.textContent = 'Parametres manquants (ip, user, folders)';
    return;
  }

  var parts = folders.split('/').filter(function(p) { return p; });
  statusEl.textContent = 'Tentative de creation du dossier...';

  // Essai 1 : WebDAV HTTP (port 5005)
  tryWebDAV('http://' + ip + ':' + port, parts)
    .then(function(r1) {
      if (r1.ok) {
        statusEl.textContent = r1.created > 0
          ? 'Dossier cree avec succes ! (' + r1.created + ' dossier(s))'
          : 'Le dossier existe deja sur le NAS';
        statusEl.style.color = '#4ecdc4';
        notifyParent(true, statusEl.textContent);
        showPath();
        setTimeout(function() { try { window.close(); } catch(e) {} }, 3000);
        return;
      }
      // Essai 2 : QTS API HTTPS (port 443)
      return tryQtsApi('https://' + ip, parts).then(function(r2) {
        if (r2.ok) {
          statusEl.textContent = r2.created > 0
            ? 'Dossier cree avec succes ! (' + r2.created + ' dossier(s))'
            : 'Le dossier existe deja sur le NAS';
          statusEl.style.color = '#4ecdc4';
          notifyParent(true, statusEl.textContent);
          showPath();
          setTimeout(function() { try { window.close(); } catch(e) {} }, 3000);
          return;
        }
        // Essai 3 : QTS API HTTP (port 8080)
        return tryQtsApi('http://' + ip + ':8080', parts).then(function(r3) {
          if (r3.ok) {
            statusEl.textContent = r3.created > 0
              ? 'Dossier cree avec succes ! (' + r3.created + ' dossier(s))'
              : 'Le dossier existe deja sur le NAS';
            statusEl.style.color = '#4ecdc4';
            notifyParent(true, statusEl.textContent);
            showPath();
            setTimeout(function() { try { window.close(); } catch(e) {} }, 3000);
            return;
          }
          // Aucune methode n'a fonctionne
          statusEl.innerHTML = 'Impossible de creer le dossier automatiquement.<br>' +
            '<span style="font-size:0.78rem;color:var(--text-3)">Verifiez que vous etes sur le reseau local et que le NAS est allume.</span>';
          statusEl.style.color = '#e74c3c';
          addStep('Creez le dossier manuellement :', 'fail');
          showPath();
          notifyParent(false, 'Toutes les methodes ont echoue');
        });
      });
    });
}

start();
</script>
</body>
</html>
